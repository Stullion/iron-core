<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Core Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f;
    --border: #2a2a2a; --accent: #e8ff47; --text: #f0f0f0; --muted: #777;
  }

  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999; opacity: 0.4;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }

  header { padding: 2rem 2rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 1rem; }
  header h1 { font-family: 'Bebas Neue', cursive; font-size: clamp(2.5rem, 6vw, 4rem); letter-spacing: 0.05em; color: var(--accent); line-height: 1; }
  header span { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; }

  /* ── Tab bar ── */
  .tab-bar-wrap { border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .tab-bar-wrap::-webkit-scrollbar { display: none; }
  .tab-bar { display: flex; max-width: 900px; margin: 0 auto; padding: 0 2rem; min-width: max-content; }

  .tab {
    font-family: 'DM Mono', monospace; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.75rem 1.25rem; background: none; border: none; color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.2s; white-space: nowrap;
  }
  .tab:hover:not(.active) { color: var(--text); }
  .tab.add-tab { color: var(--accent); opacity: 0.65; }
  .tab.add-tab:hover { opacity: 1; }
  .tab.history-tab { margin-left: auto; }
  .tab.history-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── App body ── */
  .app { max-width: 900px; margin: 0 auto; padding: 2rem; display: grid; gap: 2rem; }

  /* ── Stats row ── */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 1.2rem; text-align: center; }
  .stat-val { font-family: 'Bebas Neue', cursive; font-size: 2rem; line-height: 1; }
  .stat-lbl { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.3rem; }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 1.5rem; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .card-label { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1rem; }
  .card-stat { font-family: 'Bebas Neue', cursive; font-size: 3.5rem; line-height: 1; margin-bottom: 0.25rem; }
  .card-unit { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.5rem; }

  /* ── Timer ── */
  .timer-display { font-family: 'Bebas Neue', cursive; font-size: 5rem; line-height: 1; letter-spacing: 0.05em; text-align: center; margin: 1rem 0; }
  .timer-display.running { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.6;} }
  .timer-controls { display: flex; gap: 0.75rem; justify-content: center; margin-top: 0.5rem; }

  /* ── Progress bar ── */
  .progress-bar-wrap { background: var(--surface2); height: 6px; border-radius: 3px; overflow: hidden; margin-top: 0.75rem; }
  .progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .progress-label { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-top: 0.4rem; display: flex; justify-content: space-between; }

  /* ── Input / buttons ── */
  .input-group { display: flex; gap: 0.75rem; align-items: center; margin-top: 1rem; }
  .number-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 1.1rem; padding: 0.6rem 1rem; border-radius: 2px; width: 100px; text-align: center; outline: none; transition: border-color 0.2s; }
  .number-input:focus { border-color: var(--accent); }
  .text-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem; padding: 0.6rem 0.9rem; border-radius: 2px; width: 100%; outline: none; transition: border-color 0.2s; }
  .text-input:focus { border-color: var(--accent); }

  .btn { font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.6rem 1.2rem; border: 1px solid; border-radius: 2px; cursor: pointer; transition: all 0.15s; background: none; white-space: nowrap; }
  .btn-accent { border-color: var(--accent); color: var(--accent); }
  .btn-accent:hover { background: var(--accent); color: var(--bg); }
  .btn-muted { border-color: var(--border); color: var(--muted); }
  .btn-muted:hover { border-color: var(--muted); color: var(--text); }
  .btn-lg { padding: 0.9rem 2rem; font-size: 0.85rem; }
  .btn-full { width: 100%; margin-top: 0.6rem; font-size: 0.8rem; letter-spacing: 0.15em; }

  /* ── Cadence ── */
  .section-title { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
  .cadence-card { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 1.25rem; position: relative; }
  .cadence-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 2px 2px 0 0; }
  .cadence-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .cadence-title { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; }
  .cadence-current-goal { font-family: 'Bebas Neue', cursive; font-size: 1.1rem; color: var(--accent); }
  .cadence-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
  .cadence-field { display: flex; flex-direction: column; gap: 0.4rem; }
  .goal-label { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .cadence-input { width: 100% !important; font-size: 0.95rem !important; padding: 0.5rem 0.6rem !important; }
  .cadence-unit { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); white-space: nowrap; }
  .cadence-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }

  /* ── History ── */
  .log-container { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; }
  .log-entry { display: grid; grid-template-columns: auto 1fr auto auto; gap: 1rem; align-items: center; padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);} }
  .log-entry:last-child { border-bottom: none; }
  .log-type { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.2rem 0.5rem; border-radius: 2px; }
  .log-value { font-family: 'Bebas Neue', cursive; font-size: 1.4rem; text-align: right; }
  .log-date { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }
  .log-delete { background: none; border: none; color: var(--border); cursor: pointer; font-size: 1rem; padding: 0.2rem; transition: color 0.2s; line-height: 1; }
  .log-delete:hover { color: #ff6b6b; }
  .empty-state { padding: 3rem; text-align: center; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.8rem; letter-spacing: 0.1em; }

  /* ── Add Workout modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 200; align-items: center; justify-content: center; padding: 1.5rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 2rem; width: 100%; max-width: 480px; display: grid; gap: 1.25rem; }
  .modal-title { font-family: 'Bebas Neue', cursive; font-size: 2rem; color: var(--accent); }
  .modal-field { display: grid; gap: 0.4rem; }
  .modal-label { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .type-toggle { display: flex; gap: 0.5rem; }
  .type-btn { font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; background: none; color: var(--muted); transition: all 0.15s; flex: 1; }
  .type-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.07); }
  .modal-cadence-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
  .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 0.25rem; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--accent); color: var(--bg); font-family: 'DM Mono', monospace; font-size: 0.8rem; letter-spacing: 0.1em; padding: 0.75rem 1.5rem; border-radius: 2px; z-index: 1000; animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards; }
  @keyframes toastIn { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
  @keyframes toastOut { from{opacity:1;}to{opacity:0;transform:translateY(10px);} }
</style>
</head>
<body>

<header>
  <h1>Iron Core</h1>
  <span>Fitness Tracker</span>
</header>

<div class="tab-bar-wrap">
  <div class="tab-bar" id="tab-bar">
    <!-- workout tabs injected by JS -->
    <button class="tab add-tab" onclick="openAddModal()">+ Add</button>
    <button class="tab history-tab" id="history-tab-btn" onclick="showHistory()">History</button>
  </div>
</div>

<div class="app" id="app">
  <div id="main-content"></div>
</div>

<!-- Add Workout Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">New Workout</div>
    <div class="modal-field">
      <label class="modal-label">Name</label>
      <input type="text" class="text-input" id="new-name" placeholder="e.g. Side Plank" maxlength="30">
    </div>
    <div class="modal-field">
      <label class="modal-label">Type</label>
      <div class="type-toggle">
        <button class="type-btn selected" id="type-time-btn" onclick="selectType('time')">⏱ Time-based</button>
        <button class="type-btn" id="type-reps-btn" onclick="selectType('reps')">💪 Rep-based</button>
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Progressive Overload</label>
      <div class="modal-cadence-row">
        <div class="cadence-field">
          <label class="goal-label">Starting goal</label>
          <div style="display:flex;align-items:center;gap:0.35rem">
            <input type="number" class="number-input cadence-input" id="new-start" min="1" value="60">
            <span class="cadence-unit" id="new-start-unit">sec</span>
          </div>
        </div>
        <div class="cadence-field">
          <label class="goal-label">Increase every</label>
          <div style="display:flex;align-items:center;gap:0.35rem">
            <input type="number" class="number-input cadence-input" id="new-every" min="1" value="5">
            <span class="cadence-unit">sessions</span>
          </div>
        </div>
        <div class="cadence-field">
          <label class="goal-label">Increase by</label>
          <div style="display:flex;align-items:center;gap:0.35rem">
            <input type="number" class="number-input cadence-input" id="new-by" min="1" value="5">
            <span class="cadence-unit" id="new-by-unit">sec</span>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-muted" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-accent" onclick="saveNewWorkout()">Add Workout</button>
    </div>
  </div>
</div>

<script>
// ── Palette for new workouts ──
const COLORS = ['#4ecdc4','#ff6b6b','#ffd93d','#a29bfe','#fd79a8','#55efc4','#fdcb6e','#74b9ff'];

// ── Load / migrate data ──
function loadData() {
  try {
    const raw = localStorage.getItem('ironcore_v2');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // migrate old format
  try {
    const old = JSON.parse(localStorage.getItem('ironcore') || 'null');
    if (old) {
      const workouts = [
        { id:'plank',  name:'Plank',    type:'time', color:'#4ecdc4', cadence: old.cadence?.plank  || {start:60,every:5,by:5} },
        { id:'pushup', name:'Push-ups', type:'reps', color:'#ff6b6b', cadence: old.cadence?.pushup || {start:50,every:5,by:5} },
      ];
      return { workouts, log: old.log||[], todayCounts:{pushup: old.todayPushups||0}, todayDate: old.todayDate||'' };
    }
  } catch(e) {}
  return {
    workouts: [
      { id:'plank',  name:'Plank',    type:'time', color:'#4ecdc4', cadence:{start:60,every:5,by:5} },
      { id:'pushup', name:'Push-ups', type:'reps', color:'#ff6b6b', cadence:{start:50,every:5,by:5} },
    ],
    log:[], todayCounts:{}, todayDate:''
  };
}

let data = loadData();
const today = new Date().toDateString();
if (data.todayDate !== today) { data.todayCounts={}; data.todayDate=today; }
save();

function save() { localStorage.setItem('ironcore_v2', JSON.stringify(data)); }
function getW(id) { return data.workouts.find(w=>w.id===id); }
function sessionCount(id) { return data.log.filter(e=>e.wid===id).length; }
function computeGoal(w) { return w.cadence.start + Math.floor(sessionCount(w.id)/w.cadence.every)*w.cadence.by; }

// ── Timer state ──
let timerInterval=null, timerSeconds=0, isRunning=false, timerWid=null;
let wakeLock=null;
async function requestWakeLock(){ if(!('wakeLock' in navigator))return; try{wakeLock=await navigator.wakeLock.request('screen');}catch(e){} }
function releaseWakeLock(){ if(wakeLock){wakeLock.release();wakeLock=null;} }

// ── Active view ──
let activeWid = data.workouts[0]?.id || null;
let view = 'workout'; // 'workout' | 'history'

// ── Tab bar ──
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.querySelectorAll('.workout-tab').forEach(t=>t.remove());
  const addBtn = bar.querySelector('.add-tab');
  data.workouts.forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'tab workout-tab';
    btn.textContent = w.name;
    btn.dataset.wid = w.id;
    if (view==='workout' && w.id===activeWid) {
      btn.style.color = w.color;
      btn.style.borderBottom = `2px solid ${w.color}`;
      btn.style.marginBottom = '-1px';
    }
    btn.onclick = () => showWorkout(w.id);
    bar.insertBefore(btn, addBtn);
  });
  document.getElementById('history-tab-btn').classList.toggle('active', view==='history');
}

// ── Show workout ──
function showWorkout(wid) {
  // stop timer if switching away from its workout
  if (isRunning && timerWid !== wid) stopTimer(false);
  activeWid = wid;
  view = 'workout';
  renderTabs();
  renderWorkout();
}

function showHistory() {
  view = 'history';
  activeWid = null;
  renderTabs();
  renderHistoryView();
}

// ── Toast ──
function showToast(msg) {
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2100);
}

// ── Format ──
function fmtTime(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

// ── Render workout screen ──
function renderWorkout() {
  const w = getW(activeWid);
  if (!w) { document.getElementById('main-content').innerHTML='<div style="color:var(--muted);font-family:DM Mono,monospace;padding:2rem 0;font-size:0.8rem">No workouts. Tap + Add.</div>'; return; }

  const goal = computeGoal(w);
  const c = w.color;
  const logs = data.log.filter(e=>e.wid===w.id);
  const best = logs.length ? Math.max(...logs.map(e=>e.value)) : null;
  const bestStr = best!==null ? (w.type==='time'?fmtTime(best):best) : '—';

  let exerciseHTML = '';

  if (w.type === 'time') {
    const curSec = (isRunning && timerWid===w.id) ? timerSeconds : 0;
    const pct = Math.min(100, Math.round(curSec/goal*100));
    const running = isRunning && timerWid===w.id;
    exerciseHTML = `
      <div class="card" style="--card-color:${c}">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${c}"></div>
        <div class="card-label" style="color:${c}">${w.name} Timer</div>
        <div class="timer-display ${running?'running':''}" id="timer-display" style="color:${c}">${fmtTime(curSec)}</div>
        <div class="timer-controls">
          <button class="btn btn-lg" id="timer-btn"
            style="border-color:${c};color:${c}"
            onmouseover="this.style.background='${c}';this.style.color='#0d0d0d'"
            onmouseout="this.style.background='none';this.style.color='${c}'"
            onclick="toggleTimer('${w.id}')">${running?'Stop':'Start'}</button>
          <button class="btn btn-muted" onclick="resetTimer('${w.id}')">Reset</button>
        </div>
        <div style="margin-top:1.5rem">
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="timer-bar" style="background:${c};width:${pct}%"></div></div>
          <div class="progress-label"><span>Goal: <span id="timer-goal-lbl">${fmtTime(goal)}</span></span><span id="timer-pct">${pct}%</span></div>
        </div>
        <div class="input-group" style="margin-top:1.5rem">
          <button class="btn" style="border-color:${c};color:${c}"
            onmouseover="this.style.background='${c}';this.style.color='#0d0d0d'"
            onmouseout="this.style.background='none';this.style.color='${c}'"
            onclick="logTimeManual('${w.id}')">Log Time</button>
          <input type="number" class="number-input" id="manual-input" placeholder="sec" min="1" max="3600" style="width:90px">
          <span style="font-size:0.75rem;color:var(--muted)">or log manually</span>
        </div>
      </div>`;
  } else {
    const todayCount = data.todayCounts[w.id]||0;
    const pct = Math.min(100, Math.round(todayCount/goal*100));
    exerciseHTML = `
      <div class="card">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${c}"></div>
        <div class="card-label" style="color:${c}">${w.name}</div>
        <div class="card-stat" id="reps-count" style="color:${c}">${todayCount}</div>
        <div class="card-unit">reps today</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="reps-bar" style="background:${c};width:${pct}%"></div></div>
        <div class="progress-label"><span>Goal: <span id="reps-goal-lbl">${goal}</span></span><span id="reps-pct">${pct}%</span></div>
        <div class="input-group" style="margin-top:1.5rem">
          <input type="number" class="number-input" id="reps-input" placeholder="reps" min="1" max="9999">
          <button class="btn" style="border-color:${c};color:${c}"
            onmouseover="this.style.background='${c}';this.style.color='#0d0d0d'"
            onmouseout="this.style.background='none';this.style.color='${c}'"
            onclick="logReps('${w.id}')">Log Set</button>
        </div>
        <button class="btn btn-full" style="border-color:${c};color:${c}"
          onmouseover="this.style.background='${c}';this.style.color='#0d0d0d'"
          onmouseout="this.style.background='none';this.style.color='${c}'"
          onclick="logGoalMet('${w.id}')">✓ Goal Met</button>
      </div>`;
  }

  const unit = w.type==='time'?'sec':'reps';
  document.getElementById('main-content').innerHTML = `
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val">${logs.length}</div><div class="stat-lbl">Sessions</div></div>
      <div class="stat-box"><div class="stat-val" style="color:${c}">${bestStr}</div><div class="stat-lbl">Best</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--accent)">${w.type==='time'?fmtTime(goal):goal}</div><div class="stat-lbl">Current Goal</div></div>
    </div>
    ${exerciseHTML}
    <div>
      <div class="section-title">Progressive Overload</div>
      <div class="cadence-card">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${c};border-radius:2px 2px 0 0"></div>
        <div class="cadence-header">
          <span class="cadence-title" style="color:${c}">${w.name}</span>
          <span class="cadence-current-goal" id="cadence-lbl">Current goal: ${w.type==='time'?fmtTime(goal):goal+' reps'}</span>
        </div>
        <div class="cadence-row">
          <div class="cadence-field">
            <label class="goal-label">Starting goal</label>
            <div style="display:flex;align-items:center;gap:0.4rem">
              <input type="number" class="number-input cadence-input" id="cad-start" value="${w.cadence.start}">
              <span class="cadence-unit">${unit}</span>
            </div>
          </div>
          <div class="cadence-field">
            <label class="goal-label">Increase every</label>
            <div style="display:flex;align-items:center;gap:0.4rem">
              <input type="number" class="number-input cadence-input" id="cad-every" value="${w.cadence.every}">
              <span class="cadence-unit">sessions</span>
            </div>
          </div>
          <div class="cadence-field">
            <label class="goal-label">Increase by</label>
            <div style="display:flex;align-items:center;gap:0.4rem">
              <input type="number" class="number-input cadence-input" id="cad-by" value="${w.cadence.by}">
              <span class="cadence-unit">${unit}</span>
            </div>
          </div>
        </div>
        <div class="cadence-actions">
          <button class="btn btn-muted" onclick="deleteWorkout('${w.id}')">Delete Workout</button>
          <button class="btn btn-accent" onclick="saveCadence('${w.id}')">Save Cadence</button>
        </div>
      </div>
    </div>`;

  // Enter key bindings
  if (w.type==='time') {
    document.getElementById('manual-input')?.addEventListener('keydown', e=>{ if(e.key==='Enter') logTimeManual(w.id); });
  } else {
    document.getElementById('reps-input')?.addEventListener('keydown', e=>{ if(e.key==='Enter') logReps(w.id); });
  }
}

// ── Timer ──
function toggleTimer(wid) {
  if (!isRunning) {
    isRunning=true; timerWid=wid; requestWakeLock();
    document.getElementById('timer-btn').textContent='Stop';
    document.getElementById('timer-display').classList.add('running');
    timerInterval = setInterval(()=>{
      timerSeconds++;
      document.getElementById('timer-display').textContent=fmtTime(timerSeconds);
      const w=getW(wid), goal=computeGoal(w), pct=Math.min(100,Math.round(timerSeconds/goal*100));
      document.getElementById('timer-bar').style.width=pct+'%';
      document.getElementById('timer-pct').textContent=pct+'%';
    },1000);
  } else {
    stopTimer(true);
  }
}

function stopTimer(doLog) {
  isRunning=false; clearInterval(timerInterval); releaseWakeLock();
  const wid=timerWid; timerWid=null;
  if (doLog && timerSeconds>0) {
    data.log.unshift({wid, value:timerSeconds, date:new Date().toISOString()});
    save(); showToast(`${getW(wid).name} logged: ${fmtTime(timerSeconds)}`);
  }
  timerSeconds=0;
  if (wid===activeWid) renderWorkout();
}

function resetTimer(wid) {
  if (isRunning && timerWid===wid) { isRunning=false; clearInterval(timerInterval); releaseWakeLock(); timerWid=null; }
  timerSeconds=0;
  renderWorkout();
}

function logTimeManual(wid) {
  const val=parseInt(document.getElementById('manual-input').value);
  if (!val||val<1){showToast('Enter a valid time');return;}
  data.log.unshift({wid,value:val,date:new Date().toISOString()});
  save(); showToast(`${getW(wid).name} logged: ${fmtTime(val)}`);
  renderWorkout();
}

// ── Reps ──
function logReps(wid) {
  const val=parseInt(document.getElementById('reps-input').value);
  if (!val||val<1){showToast('Enter valid reps');return;}
  data.todayCounts[wid]=(data.todayCounts[wid]||0)+val;
  data.log.unshift({wid,value:val,date:new Date().toISOString()});
  save(); showToast(`+${val} ${getW(wid).name} logged!`);
  renderWorkout();
}

function logGoalMet(wid) {
  const w=getW(wid), goal=computeGoal(w);
  data.todayCounts[wid]=(data.todayCounts[wid]||0)+goal;
  data.log.unshift({wid,value:goal,date:new Date().toISOString()});
  save(); showToast(`Goal met! +${goal} ${w.name} logged`);
  renderWorkout();
}

// ── Cadence ──
function saveCadence(wid) {
  const s=parseInt(document.getElementById('cad-start').value);
  const e=parseInt(document.getElementById('cad-every').value);
  const b=parseInt(document.getElementById('cad-by').value);
  if(!s||!e||!b){showToast('Fill in all fields');return;}
  getW(wid).cadence={start:s,every:e,by:b};
  save(); showToast('Cadence saved!'); renderWorkout();
}

// ── Delete workout ──
function deleteWorkout(wid) {
  const w=getW(wid);
  if (!confirm(`Delete "${w.name}"?\nHistory entries will be kept.`)) return;
  data.workouts=data.workouts.filter(w=>w.id!==wid);
  save();
  activeWid=data.workouts[0]?.id||null;
  renderTabs();
  if (activeWid) showWorkout(activeWid);
  else { document.getElementById('main-content').innerHTML='<div style="color:var(--muted);font-family:DM Mono,monospace;padding:2rem 0;font-size:0.8rem">No workouts. Tap + Add.</div>'; }
}

// ── Add workout modal ──
let newType='time';

function openAddModal() {
  newType='time';
  document.getElementById('new-name').value='';
  document.getElementById('new-start').value=60;
  document.getElementById('new-every').value=5;
  document.getElementById('new-by').value=5;
  document.getElementById('new-start-unit').textContent='sec';
  document.getElementById('new-by-unit').textContent='sec';
  document.getElementById('type-time-btn').classList.add('selected');
  document.getElementById('type-reps-btn').classList.remove('selected');
  document.getElementById('add-modal').classList.add('open');
}

function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }

function selectType(t) {
  newType=t;
  document.getElementById('type-time-btn').classList.toggle('selected',t==='time');
  document.getElementById('type-reps-btn').classList.toggle('selected',t==='reps');
  const unit=t==='time'?'sec':'reps';
  document.getElementById('new-start-unit').textContent=unit;
  document.getElementById('new-by-unit').textContent=unit;
  document.getElementById('new-start').value=t==='time'?60:20;
  document.getElementById('new-by').value=5;
}

function saveNewWorkout() {
  const name=document.getElementById('new-name').value.trim();
  const start=parseInt(document.getElementById('new-start').value);
  const every=parseInt(document.getElementById('new-every').value);
  const by=parseInt(document.getElementById('new-by').value);
  if (!name){showToast('Give it a name');return;}
  if (!start||!every||!by){showToast('Fill in all cadence fields');return;}
  const id='w_'+Date.now();
  const color=COLORS[data.workouts.length%COLORS.length];
  data.workouts.push({id,name,type:newType,color,cadence:{start,every,by}});
  save(); closeAddModal(); renderTabs(); showWorkout(id);
}

document.getElementById('add-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeAddModal(); });

// ── History ──
function renderHistoryView() {
  const el = document.getElementById('main-content');
  if (!data.log.length) {
    el.innerHTML='<div class="section-title">Workout History</div><div class="log-container"><div class="empty-state">No workouts logged yet. Get moving!</div></div>'; return;
  }
  el.innerHTML=`
    <div class="section-title">Workout History</div>
    <div class="log-container">${
      data.log.map((e,i)=>{
        const w=getW(e.wid), name=w?w.name:e.wid, color=w?w.color:'#777';
        const valStr=w&&w.type==='time'?fmtTime(e.value):e.value+' reps';
        return `<div class="log-entry">
          <span class="log-type" style="background:${color}22;color:${color}">${name}</span>
          <span class="log-date">${new Date(e.date).toLocaleString()}</span>
          <span class="log-value" style="color:${color}">${valStr}</span>
          <button class="log-delete" onclick="deleteEntry(${i})">✕</button>
        </div>`;
      }).join('')
    }</div>
    <div style="margin-top:1rem;text-align:right">
      <button class="btn btn-muted" onclick="clearHistory()">Clear All History</button>
    </div>`;
}

function deleteEntry(i) { data.log.splice(i,1); save(); renderHistoryView(); }

function clearHistory() {
  if (!confirm('Clear all history?')) return;
  data.log=[]; data.todayCounts={}; save();
  renderHistoryView(); showToast('History cleared');
}

// ── Boot ──
renderTabs();
if (activeWid) showWorkout(activeWid);
</script>
</body>
</html>
